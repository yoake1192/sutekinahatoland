<body class="page-gallery">

<div data-include="header.html"></div>

<div class="page-hero">
  <div class="page-hero-inner">
    <div class="page-hero-text">
      <h1 class="page-title">ギャラリー</h1>
      <p class="page-lead">描いた絵の置き場です。タップで大きく見られます🕊️</p>
    </div>
  </div>
</div>

<main>
  <div class="tabs" role="tablist" aria-label="ジャンル切り替え">
    <button class="tab" role="tab" aria-selected="true" data-cat="trpg">TRPG</button>
    <button class="tab" role="tab" aria-selected="false" data-cat="ff14">FF14</button>
  </div>

  <!--
    ▼ 絵の追加方法 ▼
    下の<figure>をコピーして増やすだけ!
    - data-cat="trpg" か data-cat="ff14" でタブの振り分け
    - src に画像パス、alt に説明を書く
    - 画像は assets/images/gallery/ フォルダにまとめる
  -->
  <div class="grid" id="grid">
    <figure class="art" data-cat="trpg"><img src="assets/images/gallery/art_reach.jpeg" alt="作品1" loading="lazy"></figure>
    <figure class="art" data-cat="trpg"><img src="assets/images/gallery/art_rough.png" alt="作品2" loading="lazy"></figure>
    <figure class="art" data-cat="trpg"><img src="assets/images/gallery/chibi_point.png" alt="作品3" loading="lazy"></figure>
    <figure class="art" data-cat="ff14"><img src="assets/images/gallery/chibi_work.png" alt="作品4" loading="lazy"></figure>
  </div>
  <p class="empty" id="empty" hidden>このジャンルの絵はまだ準備中…🕊️</p>
</main>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="拡大表示">
  <button class="lightbox-close" id="lightboxClose" aria-label="閉じる">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<div data-include="footer.html"></div>

<script src="assets/js/include.js" defer></script>
<script src="assets/js/script.js" defer></script>
